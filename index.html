<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Invoice Generator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>
<body>

<div class="container">

<div id="invoice">

    <!-- Company Header -->

    <div class="company-header">

    <div class="logo">
        <span>CH</span>
    </div>

    <div class="company-details">

        <h1>Chavan's</h1>

        <p>Email : chavans@gmail.com</p>

        <p>Phone : +91 1234567891</p>

    </div>

</div>

<h2 class="invoice-title">INVOICE</h2>

    <hr>

    <div class="left">

    <div>

        <label>Invoice No</label>
        <input type="text" id="invoiceNo">

    </div>

    <div>

        <label>Customer Name</label>
        <input type="text" id="customer">

    </div>

    <div>

        <label>Date</label>
        <input type="date" id="date">

    </div>

    <div>

        <label>Phone</label>
        <input type="text" id="phone">

    </div>

    <div>

    <label>Address</label>

    <textarea id="address"></textarea>

</div>
    <div>

        <label>Email</label>
        <input type="email" id="email">

    </div>

</div>


    <table id="invoiceTable">

        <thead>

        <tr>

            <th>Product</th>

            <th>Qty</th>

            <th>Price</th>

            <th>Total</th>

            <th>Action</th>

        </tr>

        </thead>

        <tbody id="tbody">

        <tr>

            <td>

                <input
                    type="text"
                    class="product"
                    placeholder="Product Name">

            </td>

            <td>

                <input
                    type="number"
                    class="qty"
                    value="1"
                    min="1">

            </td>

            <td>

                <input
                    type="number"
                    class="price"
                    value="0">

            </td>

            <td class="total">0</td>

            <td>

                <button class="delete">

                    <i class="fa-solid fa-trash"></i>

                </button>

            </td>

        </tr>

        </tbody>

    </table>

    <button id="addRow">

        <i class="fa-solid fa-plus"></i>

        Add Product

    </button>

    <div class="summary">

        <div>

            <label>GST (%)</label>

            <input
                type="number"
                id="gst"
                value="18">

        </div>

        <div>

            <label>Discount</label>

            <input
                type="number"
                id="discount"
                value="0">

        </div>

        <h2>Subtotal : ₹<span id="subtotal">0</span></h2>

        <h2>GST : ₹<span id="gstAmount">0</span></h2>

        <h2>Grand Total : ₹<span id="grandTotal">0</span></h2>

    </div>

</div>

<div class="buttons">

    <button id="printBtn">

        <i class="fa-solid fa-print"></i>

        Print

    </button>

    <button id="pdfBtn">

        <i class="fa-solid fa-download"></i>

        Download PDF

    </button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
